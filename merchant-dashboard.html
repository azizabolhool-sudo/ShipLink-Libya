<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>صندوق رسائل ShipLink</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f7f6; padding: 20px; }
        .inbox-card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 10px; }
        .price-tag { color: #28a745; font-weight: bold; float: left; }
    </style>
</head>
<body>
    <h2>📥 بريدك الوارد (عروض الأسعار)</h2>
    <div id="messages">
        <div class="inbox-card">
            <strong>شركة البرق السريع ✨</strong>
            <span class="price-tag">45.00 د.ل</span>
            <p>جاهزون لاستلام شحنتك فوراً من طرابلس.</p>
            <button style="background:#007bff; color:white; border:none; padding:5px 10px; border-radius:5px;">قبول العرض</button>
        </div>
    </div>
</body>
</html>
