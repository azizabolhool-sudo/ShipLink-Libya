<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التاجر - ShipLink</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        .header { background: #003366; color: white; padding: 20px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; }
        .btn-new { background: #f39c12; color: white; padding: 10px 20px; border: none; border-radius: 5px; text-decoration: none; font-weight: bold; }
        .inbox { margin-top: 20px; }
        .message-card { background: white; padding: 15px; border-radius: 10px; margin-bottom: 10px; border-right: 5px solid #28a745; }
    </style>
</head>
<body>
    <div class="header">
        <h2>صندوق رسائل التاجر 📦</h2>
        <a href="invoice.html" class="btn-new">+ إنشاء فاتورة جديدة</a>
    </div>

    <div class="inbox">
        <h3>📩 العروض المستلمة:</h3>
        <div class="message-card">
            <strong>شركة النجم السريع</strong>
            <p>قدمت لك عرضاً بسعر: <span style="color:green">45 دينار</span> لشحنة طرابلس</p>
            <button>قبول العرض</button>
        </div>
    </div>
</body>
</html>
