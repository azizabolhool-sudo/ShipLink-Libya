<script>
async function loadOrders() {
    const res = await fetch('https://sheetdb.io/api/v1/6tgmyzwsdvocc?sheet=Sheet1');
    const orders = await res.json();
    const container = document.getElementById('ordersContainer');
    container.innerHTML = "";

    orders.forEach(order => {
        if(order.status === "بانتظار التسعير") {
            container.innerHTML += `
                <div style="border:1px solid #ddd; padding:15px; margin-bottom:10px; background:white; border-radius:10px;">
                    <strong>التاجر: ${order.store_name}</strong>
                    <p>الوجهة: ${order.location} | الوزن: ${order.weight}</p>
                    <input type="number" id="p-${order.id}" placeholder="أدخل السعر">
                    <button onclick="submitPrice('${order.id}')">إرسال السعر للتاجر</button>
                </div>`;
        }
    });
}
loadOrders();
</script>
