<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء فاتورة - ShipLink</title>
    <style>
        body { font-family: sans-serif; background: #003366; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .invoice-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 100%; max-width: 400px; }
        h2 { text-align: center; color: #003366; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .send-btn { background: #f39c12; color: white; border: none; width: 100%; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 18px; margin-top: 10px; transition: 0.3s; }
        .send-btn:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="invoice-card">
    <h2>📋 تفاصيل الشحنة</h2>
    <input type="text" id="store" placeholder="اسم متجرك">
    <input type="text" id="loc" placeholder="وجهة الشحنة (المدينة)">
    <input type="text" id="weight" placeholder="الوزن (مثلاً: 5kg)">
    
    <button class="send-btn" id="submitBtn" onclick="sendToDatabase()">إرسال للشركات الآن 🚀</button>
</div>

<script>
async function sendToDatabase() {
    const store = document.getElementById('store').value;
    const loc = document.getElementById('loc').value;
    const weight = document.getElementById('weight').value;
    const btn = document.getElementById('submitBtn');

    if (!store || !loc) {
        alert("الرجاء إدخال اسم المتجر والوجهة على الأقل");
        return;
    }

    btn.disabled = true;
    btn.innerHTML = "جاري الإرسال للشركات... ⏳";

    // البيانات التي ستذهب لجدول جوجل الخاص بك
    const data = {
        "id": Date.now(),
        "store_name": store,
        "location": loc,
        "weight": weight,
        "status": "بانتظار التسعير"
    };

    try {
        // تم وضع رابط الـ API الخاص بك هنا
        const response = await fetch('https://sheetdb.io/api/v1/6tgmyzwsdvocc', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ data: [data] })
        });

        if (response.ok) {
            alert("✅ رائع! تم إرسال الفاتورة لجدول البيانات بنجاح.");
            // يوجه التاجر للوحة التحكم بعد النجاح
            window.location.href = "merchant-dashboard.html";
        } else {
            alert("❌ فشل الإرسال، تأكد من إعدادات SheetDB");
            btn.disabled = false;
            btn.innerHTML = "إرسال للشركات الآن 🚀";
        }
    } catch (error) {
        alert("حدث خطأ في الاتصال بالإنترنت");
        btn.disabled = false;
        btn.innerHTML = "إرسال للشركات الآن 🚀";
    }
}
</script>

</body>
</html>
