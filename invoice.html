<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ShipLink | فاتورة شحن</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
        .invoice-box { background: white; max-width: 700px; margin: auto; padding: 30px; border-radius: 10px; border-top: 15px solid #003366; position: relative; }
        .header { display: flex; justify-content: space-between; border-bottom: 2px solid #f2a900; padding-bottom: 20px; margin-bottom: 20px; }
        .section-title { background: #003366; color: white; padding: 5px 15px; display: inline-block; border-radius: 5px; margin-bottom: 10px; }
        input, textarea { width: 100%; padding: 10px; margin: 5px 0 15px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .price-box { background: #fffde7; padding: 15px; border: 2px dashed #f2a900; border-radius: 10px; margin-top: 20px; }
        .whatsapp-btn { background: #25D366; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 18px; }
    </style>
</head>
<body>
    <div class="invoice-box">
        <div class="header">
            <div>
                <h1 style="color:#003366; margin:0">ShipLink Libya 🚛</h1>
                <small>رقم الطلب: #SL-2026-99</small>
            </div>
            <div style="text-align: left;">
                <strong>تاريخ الطلب</strong><br>2026/03/29
            </div>
        </div>

        <span class="section-title">بيانات التاجر</span>
        <input type="text" id="store" placeholder="اسم المتجر">
        
        <span class="section-title">بيانات الشحنة</span>
        <div style="display:flex; gap:10px;">
            <input type="text" id="loc" placeholder="الوجهة (المدينة)">
            <input type="text" id="weight" placeholder="الوزن/الكمية">
        </div>
        <textarea id="desc" rows="3" placeholder="تفاصيل إضافية عن الشحنة (مثلاً: مواد قابلة للكسر، يحتاج تغليف خاص)"></textarea>

        <div class="price-box">
            <h4 style="margin:0; color:#c0392b">خاص بشركة الشحن فقط:</h4>
            <p style="font-size:12px">عند استلام الرابط، تضع الشركة السعر هنا ثم تعيد إرساله للتاجر</p>
            <input type="text" id="price" placeholder="أدخل سعر الشحن المقترح (دينار ليبي)" style="border: 2px solid #27ae60">
        </div>

        <button class="whatsapp-btn" onclick="sendRequest()">إرسال الطلب لشركات الشحن (WhatsApp) ✅</button>
    </div>

    <script>
        function sendRequest() {
            var store = document.getElementById('store').value;
            var loc = document.getElementById('loc').value;
            var desc = document.getElementById('desc').value;
            var price = document.getElementById('price').value;

            var msg = "*ShipLink Libya - طلب شحن جديد*%0A" +
                      "----------------------------%0A" +
                      "*المتجر:* " + store + "%0A" +
                      "*الوجهة:* " + loc + "%0A" +
                      "*التفاصيل:* " + desc + "%0A" +
                      "----------------------------%0A" +
                      "⚠️ *السعر المقترح من الشركة:* " + (price ? price : "قيد التسعير") + "%0A" +
                      "----------------------------%0A" +
                      "يرجى الرد لتأكيد الطلب.";

            window.open("https://wa.me/?text=" + msg, '_blank');
        }
    </script>
<div id="companyBox" style="display:none; margin-top:30px; border:2px solid #007bff; padding:15px; border-radius:10px; background:#f0faff;">
    <h4>🛠️ لوحة تسعير الشركة</h4>
    <input type="number" id="priceInput" placeholder="ضع سعرك هنا..." style="width:100%; padding:10px; margin-bottom:10px;">
    <button onclick="alert('تم إرسال السعر للتاجر بنجاح!')" style="width:100%; background:#28a745; color:white; border:none; padding:10px; border-radius:5px;">إرسال التسعيرة</button>
</div>

<script>
const params = new URLSearchParams(window.location.search);
if(params.get('role') === 'company') {
    document.getElementById('companyBox').style.display = 'block';
}
</script>
</body>
</html>
