<script>
async function sendInvoice() {
    const data = {
        "id": Date.now(),
        "store_name": document.getElementById('store').value,
        "location": document.getElementById('loc').value,
        "weight": document.getElementById('weight').value,
        "status": "بانتظار التسعير"
    };

    try {
        // نرسل لـ Sheet1 (ورقة الشحنات)
        await fetch('https://sheetdb.io/api/v1/6tgmyzwsdvocc?sheet=Sheet1', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({data: [data]})
        });
        alert("تم إرسال فاتورتك لجميع الشركات!");
        window.location.href = "merchant-dashboard.html";
    } catch(e) { alert("فشل الإرسال"); }
}
</script>
