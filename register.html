<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - ShipLink Libya</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #003366; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: #333; }
        .login-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 90%; max-width: 400px; text-align: center; }
        h2 { color: #003366; margin-bottom: 25px; }
        .user-type-btn { width: 100%; padding: 15px; margin-bottom: 15px; border: 2px solid #eee; border-radius: 10px; background: white; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 16px; }
        .user-type-btn:hover { border-color: #f39c12; background: #fffdf9; }
        .google-btn { background: #4285F4; color: white; border: none; width: 100%; padding: 15px; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 10px; display: flex; align-items: center; justify-content: center; }
        .google-btn img { margin-left: 10px; width: 20px; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>مرحباً بك في ShipLink</h2>
        <p>يرجى اختيار نوع الحساب للدخول</p>
        
        <button class="user-type-btn" onclick="selectType('merchant')">
            📦 أنا تاجر (إرسال شحنات)
        </button>
        
        <button class="user-type-btn" onclick="selectType('company')">
            🚚 أنا شركة شحن (تقديم أسعار)
        </button>

        <div id="google-section" style="display:none;">
            <hr>
            <button class="google-btn" onclick="processLogin()">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg">
                متابعة بواسطة Google
            </button>
        </div>
    </div>

    <script>
        let selectedRole = '';
        function selectType(role) {
            selectedRole = role;
            document.querySelectorAll('.user-type-btn').forEach(btn => btn.style.borderColor = '#eee');
            event.currentTarget.style.borderColor = '#f39c12';
            document.getElementById('google-section').style.display = 'block';
        }

        function processLogin() {
            localStorage.setItem('userRole', selectedRole);
            alert("تم تسجيل الدخول بنجاح كـ " + (selectedRole === 'merchant' ? 'تاجر' : 'شركة'));
            window.location.href = selectedRole === 'merchant' ? "merchant-dashboard.html" : "company-dashboard.html";
        }
    </script>
</body>
</html>
