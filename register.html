<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShipLink - تسجيل الدخول</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #003366; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 380px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .btn-select { border: 2px solid #eee; padding: 20px; border-radius: 12px; margin-bottom: 10px; cursor: pointer; font-weight: bold; color: #003366; transition: 0.3s; }
        .btn-select:hover { border-color: #f39c12; background: #fffcf5; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .submit-btn { background: #f39c12; color: white; border: none; width: 100%; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="selection" class="card">
    <h2 style="color:#003366">مرحباً بك في ShipLink</h2>
    <p>اختر نوع حسابك للمتابعة</p>
    <div class="btn-select" onclick="openForm('merchant')">📦 بوابة التاجر</div>
    <div class="btn-select" onclick="openForm('company')">🚚 بوابة شركات الشحن</div>
</div>

<div id="formContainer" class="card" style="display:none">
    <h3 id="title">إنشاء حساب</h3>
    <input type="text" id="name" placeholder="الاسم الكامل / اسم الشركة">
    <input type="text" id="contact" placeholder="">
    <input type="password" id="pass" placeholder="كلمة المرور">
    <button class="submit-btn" id="saveBtn" onclick="saveUser()">تأكيد التسجيل وحفظ الحساب 🚀</button>
</div>

<script>
    let role = '';
    const api = 'https://sheetdb.io/api/v1/6tgmyzwsdvocc?sheet=users';

    function openForm(r) {
        role = r;
        document.getElementById('selection').style.display = 'none';
        document.getElementById('formContainer').style.display = 'block';
        document.getElementById('contact').placeholder = (r === 'merchant') ? "Gmail (لاستلام التنبيهات)" : "رقم الواتساب (لربط الفواتير)";
        document.getElementById('title').innerText = (r === 'merchant') ? "تسجيل تاجر جديد" : "تسجيل شركة شحن";
    }

    async function saveUser() {
        const name = document.getElementById('name').value;
        const contact = document.getElementById('contact').value;
        const pass = document.getElementById('pass').value;
        if(!name || !contact || !pass) return alert("يرجى إكمال البيانات");

        const btn = document.getElementById('saveBtn');
        btn.disabled = true; btn.innerHTML = "جاري الحفظ بالسيرفر... ⏳";

        try {
            await fetch(api, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({data: [{"id": Date.now(), "role": role, "name": name, "email_or_whatsapp": contact, "password": pass}]})
            });
            localStorage.setItem('role', role);
            localStorage.setItem('name', name);
            alert("تم الحفظ بنجاح!");
            window.location.href = (role === 'merchant') ? "merchant-dashboard.html" : "company-dashboard.html";
        } catch(e) { alert("خطأ في الاتصال"); btn.disabled = false; }
    }
</script>
</body>
</html>
